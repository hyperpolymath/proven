# SPDX-License-Identifier: MPL-2.0
name: BoJ Server Build Trigger
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  trigger-boj:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - name: Trigger BoJ Server (Casket/ssg-mcp)
        env:
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          # Send a secure trigger to boj-server to build this repository.
          # Payload values are passed via env vars rather than workflow expressions
          # interpolation to avoid shell-injection by branch name.
          payload=$(jq -nc \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            '{repo: $repo, branch: $branch, engine: "casket"}')
          curl -X POST "https://boj-server.local:7700/cartridges/ssg-mcp/invoke" \
            -H "Content-Type: application/json" \
            -d "$payload"
        continue-on-error: true
